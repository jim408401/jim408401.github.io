<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jim | Tech Portfolio</title>
    <style>
        /* 基礎設定：深色背景與等寬科技字體 */
        :root {
            --bg-color: #0a192f;      /* 深邃藍底色 */
            --text-main: #ccd6f6;     /* 主文字色 */
            --text-dark: #8892b0;     /* 次文字色 */
            --neon-color: #64ffda;    /* 科技青色 */
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace; /* 終端機字體 */
            margin: 0;
            padding: 0;
            /* 科技感網格背景 */
            background-image: 
                linear-gradient(rgba(100, 255, 218, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100, 255, 218, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 20px;
        }

        /* 終端機打字效果區塊 */
        .terminal {
            font-size: 1.2rem;
            color: var(--neon-color);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 4rem;
            margin: 0 0 20px 0;
            color: var(--text-main);
        }

        p.subtitle {
            font-size: 1.2rem;
            color: var(--text-dark);
            line-height: 1.6;
            max-width: 600px;
        }

        /* 技能標籤 */
        .skills {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .skill-tag {
            border: 1px solid var(--neon-color);
            color: var(--neon-color);
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            background: rgba(100, 255, 218, 0.05);
        }

        .skill-tag:hover {
            background: var(--neon-color);
            color: var(--bg-color);
            box-shadow: 0 0 10px var(--neon-color);
            cursor: pointer;
        }

        /* 科技感按鈕 */
        .btn {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 30px;
            color: var(--neon-color);
            border: 2px solid var(--neon-color);
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn:hover {
            background: rgba(100, 255, 218, 0.1);
            box-shadow: 0 0 15px var(--neon-color);
            transform: translateY(-3px);
        }

        /* 閃爍游標 */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background-color: var(--neon-color);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 打字機動畫區 -->
        <div class="terminal">
            <span>> </span><span id="typewriter"></span><span class="cursor"></span>
        </div>
        
        <h1>Jim.</h1>
        <p class="subtitle">
            歡迎來到我的虛擬空間。<br>
            我專注於探索新技術、構建高效能的應用程式，並致力於打造迷人的數位體驗。
        </p>

        <!-- 你的技能樹 (可隨意更改) -->
        <div class="skills">
            <span class="skill-tag">JavaScript</span>
            <span class="skill-tag">Python</span>
            <span class="skill-tag">AI Tools</span>
            <span class="skill-tag">Web Development</span>
            <span class="skill-tag">GitHub</span>
        </div>

        <a href="https://github.com/jim408401" class="btn">查看我的 GitHub >></a>
    </div>

    <!-- JavaScript 負責打字機動畫 -->
    <script>
        const textArray = ["System.out.println('Hello World');", "Initiating profile...", "Welcome to Jim's Website."];
        let textIndex = 0;
        let charIndex = 0;
        const speed = 100; // 打字速度
        const delayBetweenTexts = 2000; // 句子之間的停頓

        function typeWriter() {
            if (charIndex < textArray[textIndex].length) {
                document.getElementById("typewriter").innerHTML += textArray[textIndex].charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, speed);
            } else {
                setTimeout(eraseText, delayBetweenTexts);
            }
        }

        function eraseText() {
            if (charIndex > 0) {
                document.getElementById("typewriter").innerHTML = textArray[textIndex].substring(0, charIndex - 1);
                charIndex--;
                setTimeout(eraseText, speed / 2);
            } else {
                textIndex++;
                if (textIndex >= textArray.length) textIndex = 0;
                setTimeout(typeWriter, speed);
            }
        }

        // 啟動動畫
        window.onload = typeWriter;
    </script>
</body>
</html>
